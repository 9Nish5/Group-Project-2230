<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volunteer Hours Tracker</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <h1>Community Support Tracker</h1>
    <nav>
      <a href="">Donation Tracker</a>
      <a href="">Event Signup</a>
    </nav>
  </header>

  <main>
    <h2>Volunteer Hours Tracker</h2>

    <form id="volunteerForm">

      <div>
        <label for="charityName">Charity Name</label>
        <input type="text" id="charityName" placeholder="Enter charity name" />
      </div>

      <div>
        <label for="hours">Hours Volunteered</label>
        <input type="number" id="hours" placeholder="Enter hours" />
      </div>

      <div>
        <label for="date">Date</label>
        <input type="date" id="date" />
      </div>

      <div>
        <label for="rating">Volunteer Experience Rating (1-5)</label>
        <input type="number" id="rating" min="1" max="5" />
      </div>

      <button type="submit">Submit</button>

    </form>

    <section>
    <h2>Volunteer Logs</h2>
    <table id="volunteerTable">

        <thead>
            <tr>
                <th>Charity Name</th>
                <th>Hours Volunteered</th>
                <th>Date</th>
                <th>Experience Rating</th>
                <th>Delete</th>
            </tr>
        </thead>

        <tbody id="tableBody">

        </tbody>

    </table>

</section>

  </main>


  <script src="script.js"></script>
</body>
</html>
