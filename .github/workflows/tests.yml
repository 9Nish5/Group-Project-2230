name: Run Jest Tests

on: [pull_request]

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            issues: read
            checks: write
            pull-requests: write

        steps:
            - uses: actions/checkout@v4
            
            - name: Use Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20.x"

            - name: Install Dependencies
              run: npm install

            - name: Run Jest Tests
              run: npx jest --config=jest.config.js --ci --no-cache --watchAll=false

            - name: Publish Test Results
              uses: EnricoMi/publish-unit-test-result-action@v2
              if: always()
              with:
                  files: test-results/jest/*.xml