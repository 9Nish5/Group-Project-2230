name: Run Jest Tests

on: [pull_request]

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            issues: read
            checks: write
            pull-requests: write

        steps:
            - uses: actions/checkout@v4
            
            - name: Use Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20.x"

            # Swapped 'npm ci' for 'npm install' to prevent lockfile desync errors
            - name: Install Dependencies
              run: npm install

            # Bypasses package.json scripts and forces Jest to search the root directory
            - name: Run Jest Tests
              run: npx jest --roots="." --ci

            - name: Archive Jest Test Results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: jest-test-results
                  path: test-results/jest/

            - name: Publish Test Results
              uses: EnricoMi/publish-unit-test-result-action@v2
              if: always()
              with:
                  files: test-results/jest/*.xml

            - name: Run Jest Tests
              run: npx jest --testMatch="**/*.test.js" --ci